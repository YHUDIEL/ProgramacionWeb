<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - Convertidor Celsius a Fahrenheit</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .calculadora {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 22px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 24px;
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dde2e8;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.2);
        }
        input[readonly] {
            background-color: #f8f9fa;
            color: #2c3e50;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="calculadora">
        <h1>Convertidor de Temperatura</h1>
        <p>Ingresa grados Celsius para obtener Fahrenheit.</p>

        <label for="celsius">Temperatura en Celsius (°C)</label>
        <input type="number" id="celsius" placeholder="Ej: 25">
        <span class="error" id="error-msg">Por favor ingresa un valor numérico válido.</span>

        <label for="fahrenheit">Resultado en Fahrenheit (°F)</label>
        <input type="text" id="fahrenheit" readonly placeholder="El resultado aparecerá aquí">

        <button onclick="convertir()">Convertir</button>
    </div>

    <script>
        function convertir() {
            const entrada = document.getElementById('celsius').value;
            const errorMsg = document.getElementById('error-msg');
            const resultado = document.getElementById('fahrenheit');

            if (entrada === '' || isNaN(entrada)) {
                errorMsg.style.display = 'block';
                resultado.value = '';
                return;
            }

            errorMsg.style.display = 'none';
            const fahrenheit = (parseFloat(entrada) * 9 / 5) + 32;
            resultado.value = fahrenheit.toFixed(2) + '°F';
        }
    </script>
</body>
</html>
