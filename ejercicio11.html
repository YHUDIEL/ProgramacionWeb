<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11 - Convertidor Kilómetros a Millas</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>
<body>
    <div class="contenedor">
        <h1>Convertidor de Distancia</h1>
        <p>Ingresa distancia en kilometros y conviertela a millas</p>

        <form onsubmit="convertir(); return false;">
            <label for="km">Distancia en kilometros (km)</label>
            <input type="number" id="km" placeholder="Ej: 25" min ="0" required>
           
            <label for="millas">Resultado en Millas (mi)</label>
            <input type="text" id="millas" readonly placeholder="El resultado aparecerá aquí">

        <button type="submit">Convertir</button>
    </div>
    <script src="js/ejercicio11.js"></script>
</body>
</html>
