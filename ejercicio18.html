<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Manipulación de DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-start py-5 min-vh-100">
    <div class="card shadow-sm p-4" style="max-width: 500px; width: 100%;">
        <h1 class="h4 fw-bold text-primary mb-1">Agregar y Eliminar Elementos</h1>
        <p class="text-muted small mb-4">Escribe un elemento y agrégalo a la lista.</p>

        <div class="input-group mb-3">
            <input
                type="text"
                id="nuevoElemento"
                class="form-control"
                placeholder="Escribe algo..."
            >
            <button id="agregarBtn" class="btn btn-primary">Agregar</button>
        </div>
        <div class="invalid-feedback" id="errorMsg" style="display: none; color: #dc3545; font-size: 0.875em; margin-top: -10px; margin-bottom: 8px;">
            Escribe algo antes de agregar.
        </div>

        <ul id="lista" class="list-group"></ul>
    </div>

    <script src="js/ejercicio18.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
