<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 16 - Calculadora</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SweetAlert2, para mostrar los mensajes de error -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="contenedor">
        <h1>Calculadora de operaciones básicas</h1>
        <p>Ingresa dos números y elige la operación que quieras realizar. El resultado aparecerá abajo.</p>

        <label for="numero1">Número 1:</label>
        <input type="text" id="numero1" placeholder="Ejemplo: 10">

        <label for="numero2">Número 2:</label>
        <input type="text" id="numero2" placeholder="Ejemplo: 5">

        <button onclick="calcularOperacion('suma')">Sumar</button>
        <button onclick="calcularOperacion('resta')">Restar</button>
        <button onclick="calcularOperacion('multiplicacion')">Multiplicar</button>
        <button onclick="calcularOperacion('division')">Dividir</button>

        <label for="resultado">Resultado:</label>
        <input type="text" id="resultado" readonly>
    </div>

    <script src="js/ejercicio16.js"></script>
</body>
</html>
