<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - saber si puedes votar</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>
<body>
    <div class="contenedor">
        <h1>Saber si puedes votar</h1>
        <p>Ingresa tu edad para saber si puedes votar</p>

        <form onsubmit="verificarVoto(); return false;">
            <label for="edad">Edad</label>
            <input type="number" id="edad" placeholder="Ej: 18" min="0" required>
           
            <label for="voto">Resultado</label>
            <input type="text" id="voto" readonly placeholder="El resultado aparecerá aquí">

        <button type="submit">Verificar</button>
    </div>
    <script src="js/ejercicio13.js"></script>
</body>
</html>
